name: swf_app
description: "StuffWithFantasy app"
publish_to: 'none'
version: 0.1.0+20

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  google_fonts: ^8.0.2
  flutter_svg: ^2.2.4
  pretext:
    git:
      url: git@github.com:sethgw/pretext.git
      ref: v0.4.0
  http: ^1.3.0
  shared_preferences: ^2.3.0
  url_launcher: ^6.3.2
  share_plus: ^10.1.4
  file_picker: ^10.3.10
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/

  # Uncomment and add Yana / Urbane Rounded .ttf files to assets/fonts/
  # for an exact match with the website's Adobe Typekit fonts:
  #
  # fonts:
  #   - family: Yana
  #     fonts:
  #       - asset: assets/fonts/Yana-Regular.ttf
  #       - asset: assets/fonts/Yana-Bold.ttf
  #         weight: 700
  #   - family: UrbaneRounded
  #     fonts:
  #       - asset: assets/fonts/UrbaneRounded-Regular.ttf
  #       - asset: assets/fonts/UrbaneRounded-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/UrbaneRounded-Bold.ttf
  #         weight: 700
